<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>個人記帳系統 Mobile v11</title>
  <style>
    :root{
      --bg:#f6f3ec;--surface:#fffdf8;--surface2:#f1ece2;--text:#25231f;--muted:#7a7368;
      --line:#e4dacc;--dark:#2f342b;--green:#526946;--greenSoft:#e8efe3;--red:#9a4a40;
      --redSoft:#f5e3dd;--blueSoft:#e5ebef;--purpleSoft:#eee7f2;--shadow:0 10px 28px rgba(48,43,35,.08);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;background:linear-gradient(180deg,#f8f5ef,#f2eee6);color:var(--text)}
    .app{width:100%;max-width:480px;margin:0 auto;min-height:100vh;padding:14px 12px 92px}
    .hero{position:sticky;top:0;z-index:20;margin:-14px -12px 0;padding:calc(14px + env(safe-area-inset-top)) 12px 12px;background:linear-gradient(135deg,#2f342b,#526946);color:#fffdf8;box-shadow:0 8px 22px rgba(47,52,43,.18);border-radius:0 0 24px 24px}
    .hero-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .title{margin:0;font-size:22px;line-height:1.15;letter-spacing:-.04em}
    .subtitle{margin:5px 0 0;font-size:12px;color:rgba(255,253,248,.68)}
    .button{border:0;border-radius:14px;padding:11px 14px;min-height:42px;font-size:14px;font-weight:900;cursor:pointer;white-space:nowrap}
    .button.primary{background:var(--dark);color:#fffdf8}.button.light{background:rgba(255,253,248,.16);color:#fffdf8;border:1px solid rgba(255,253,248,.18)}
    .button.secondary{background:var(--surface2);color:var(--text)}.button.danger{background:var(--redSoft);color:#7d2f2a}.button.small{min-height:34px;padding:7px 10px;border-radius:11px;font-size:13px}
    .summary-strip{display:grid;grid-template-columns:repeat(3,minmax(138px,1fr));gap:10px;overflow-x:auto;padding:12px 0 3px;scrollbar-width:none}.summary-strip::-webkit-scrollbar{display:none}
    .summary-card{border-radius:20px;padding:14px;min-height:104px;border:1px solid rgba(255,253,248,.7);box-shadow:var(--shadow)}
    .summary-card.income{background:linear-gradient(135deg,#f4f8ef,#deead5)}.summary-card.expense{background:linear-gradient(135deg,#fbf0e8,#f0d7ca)}.summary-card.balance{background:linear-gradient(135deg,#edf1f3,#d6e0e5)}
    .summary-label{font-size:12px;font-weight:900;color:rgba(37,35,31,.66)}.summary-value{margin-top:12px;font-size:22px;font-weight:950;letter-spacing:-.045em;line-height:1.05}.summary-note{margin-top:8px;font-size:11px;color:var(--muted)}
    .panel,details.query-details{background:rgba(255,253,248,.92);border:1px solid rgba(228,218,204,.86);border-radius:24px;padding:16px;box-shadow:var(--shadow);margin-top:12px}
    details.query-details{padding:0;overflow:hidden}details.query-details>summary{list-style:none;cursor:pointer;padding:16px;display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:950}details.query-details>summary::-webkit-details-marker{display:none}
    .query-body{padding:0 16px 16px}.section-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.section-title{margin:0;font-size:16px;font-weight:950;letter-spacing:-.025em}.section-subtitle{margin:4px 0 0;font-size:12px;color:var(--muted);line-height:1.55}
    .entry-list{display:grid;gap:10px}.entry-card{background:#fffaf2;border:1px solid var(--line);border-radius:18px;padding:14px}.entry-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.entry-title{display:flex;align-items:center;gap:7px;min-width:0;font-weight:950}.entry-title-text{min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.entry-date{margin-top:6px;font-size:12px;color:var(--muted)}.entry-amount{font-size:17px;font-weight:950;white-space:nowrap;text-align:right}.entry-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .tag{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;flex:0 0 auto}.tag.income{background:var(--greenSoft);color:#3f5637}.tag.expense{background:var(--redSoft);color:#7d2f2a}.amount-income{color:var(--green)}.amount-expense{color:var(--red)}
    .form-grid{display:grid;gap:10px}.field label{display:block;margin-bottom:6px;font-size:12px;color:var(--muted);font-weight:900}.field input,.field select{width:100%;min-height:45px;border:1px solid var(--line);border-radius:14px;background:#fffdf8;color:var(--text);padding:11px 12px;font-size:15px;outline:none}.date-row,.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .query-metrics{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}.query-metric{display:flex;justify-content:space-between;align-items:center;gap:12px;border-radius:16px;padding:12px 13px;border:1px solid transparent}.query-metric.income{background:#eef5e9;border-color:#dce8d5}.query-metric.expense{background:#f6e7e1;border-color:#ecd5cc}.query-metric.balance{background:#ebe8f0;border-color:#ded6e7}.query-metric-label{font-size:12px;color:var(--muted);font-weight:900}.query-metric-value{font-size:17px;font-weight:950}.query-metric.income .query-metric-value{color:var(--green)}.query-metric.expense .query-metric-value{color:var(--red)}
    .category-box{margin-top:12px;background:#fffaf2;border:1px solid var(--line);border-radius:18px;padding:13px}.bar-row{display:grid;grid-template-columns:74px 1fr 58px;gap:8px;align-items:center;margin-bottom:10px;font-size:12px}.bar-bg{height:8px;background:#e5ded2;border-radius:999px;overflow:hidden}.bar-fill{height:100%;background:var(--green);border-radius:999px}.muted{color:var(--muted);font-size:12px;line-height:1.6;margin:0}.empty{padding:18px;border-radius:16px;background:#f8f3eb;color:var(--muted);text-align:center;font-size:13px}
    .edit-grid{display:grid;grid-template-columns:1fr;gap:8px}.edit-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(37,35,31,.46);display:none;z-index:1000;align-items:flex-end;backdrop-filter:blur(5px)}.modal-backdrop.open{display:flex}.modal{width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:26px 26px 0 0;box-shadow:0 -22px 60px rgba(37,35,31,.28);max-height:92vh;overflow:auto;padding-bottom:env(safe-area-inset-bottom)}.modal-handle{width:44px;height:5px;border-radius:999px;background:#d8cfc1;margin:10px auto 6px}.modal-header{padding:12px 18px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line)}.modal-title{margin:0;font-size:18px;font-weight:950}.modal-body{padding:16px 18px}.modal-footer{padding:0 18px 18px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.icon-button{border:0;width:36px;height:36px;border-radius:12px;background:var(--surface2);color:var(--text);font-size:20px;cursor:pointer}
    .bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:480px;padding:8px 12px calc(8px + env(safe-area-inset-bottom));background:rgba(255,253,248,.88);backdrop-filter:blur(14px);border-top:1px solid rgba(228,218,204,.9);z-index:30;display:grid;grid-template-columns:1fr 1.25fr 1fr;gap:8px}.nav-btn{border:0;background:transparent;color:var(--muted);font-size:12px;font-weight:900;padding:8px 5px;border-radius:14px;cursor:pointer}.nav-btn.main{background:var(--dark);color:#fffdf8;font-size:14px}
    @media(min-width:760px){body{background:linear-gradient(90deg,rgba(47,52,43,.07) 0,rgba(47,52,43,.07) calc(50% - 260px),transparent calc(50% - 260px),transparent calc(50% + 260px),rgba(47,52,43,.07) calc(50% + 260px)),linear-gradient(180deg,#f8f5ef,#f2eee6)}.app{border-left:1px solid rgba(228,218,204,.7);border-right:1px solid rgba(228,218,204,.7)}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero"><div class="hero-row"><div><h1 class="title">個人記帳</h1><p class="subtitle">手機版介面預覽</p></div><button class="button light" id="openManualModalBtn">新增</button></div></section>
    <section class="summary-strip">
      <div class="summary-card income"><div class="summary-label">本月收入</div><div class="summary-value" id="topMonthIncome">0 元</div><div class="summary-note">收入加總</div></div>
      <div class="summary-card expense"><div class="summary-label">本月支出</div><div class="summary-value" id="topMonthExpense">0 元</div><div class="summary-note">支出加總</div></div>
      <div class="summary-card balance"><div class="summary-label">目前結餘</div><div class="summary-value" id="topMonthBalance">0 元</div><div class="summary-note">收入 - 支出</div></div>
    </section>
    <section class="panel" id="todaySection"><div class="section-head"><div><h2 class="section-title">今日明細</h2><p class="section-subtitle">快速確認今天建立的收支。</p></div><button class="button secondary small" id="openManualModalBtn2">新增</button></div><div id="todayList" class="entry-list"></div></section>
    <details class="query-details" id="queryDetails" open><summary><div><div>收支統計查詢</div><p class="section-subtitle">月份、日期、類型、分類篩選。</p></div><div>⌃</div></summary><div class="query-body">
      <div class="form-grid"><div class="field"><label>查詢月份</label><input id="statsMonth" type="month" /></div><div class="date-row"><div class="field"><label>起始日期</label><input id="statsStartDate" type="date" /></div><div class="field"><label>結束日期</label><input id="statsEndDate" type="date" /></div></div><div class="filter-row"><div class="field"><label>類型</label><select id="statsType"><option value="all">全部</option><option value="income">收入</option><option value="expense">支出</option></select></div><div class="field"><label>分類</label><select id="statsCategory"></select></div></div></div>
      <div class="toolbar"><button class="button secondary" id="resetStatsBtn">清除</button><button class="button primary" id="applyStatsBtn">篩選</button></div>
      <section class="query-metrics"><div class="query-metric income"><div class="query-metric-label">篩選收入</div><div class="query-metric-value" id="filteredIncome">0 元</div></div><div class="query-metric expense"><div class="query-metric-label">篩選支出</div><div class="query-metric-value" id="filteredExpense">0 元</div></div><div class="query-metric balance"><div class="query-metric-label">篩選結餘</div><div class="query-metric-value" id="filteredBalance">0 元</div></div></section>
      <div class="category-box"><div class="section-head" style="margin-bottom:10px;"><h3 class="section-title" style="font-size:14px;">分類統計</h3></div><div id="categoryBars"></div></div><p class="muted" id="statsSummaryText" style="margin-top:10px;">目前顯示本月全部資料。</p>
    </div></details>
    <section class="panel" id="detailsSection"><div class="section-head"><div><h2 class="section-title">篩選後明細</h2><p class="section-subtitle" id="detailCountText">目前顯示 0 筆資料</p></div></div><div id="detailList" class="entry-list"></div></section>
  </main>
  <nav class="bottom-nav"><button class="nav-btn" id="jumpTodayBtn">今日</button><button class="nav-btn main" id="bottomAddBtn">＋ 新增收支</button><button class="nav-btn" id="jumpStatsBtn">查詢</button></nav>
  <div class="modal-backdrop" id="manualModal"><div class="modal"><div class="modal-handle"></div><div class="modal-header"><div><h2 class="modal-title">新增收支</h2><p class="section-subtitle">建立後會同步更新今日明細與統計。</p></div><button class="icon-button" id="closeManualModalBtn">×</button></div><div class="modal-body"><div class="form-grid"><div class="field"><label>日期</label><input id="manualDate" type="date" /></div><div class="filter-row"><div class="field"><label>類型</label><select id="manualType"><option value="expense">支出</option><option value="income">收入</option></select></div><div class="field"><label>分類</label><select id="manualCategory"></select></div></div><div class="field"><label>項目</label><input id="manualItem" placeholder="例如：伙食費" /></div><div class="field"><label>金額</label><input id="manualAmount" type="number" placeholder="2000" inputmode="numeric" /></div></div></div><div class="modal-footer"><button class="button secondary" id="clearManualBtn">清空</button><button class="button primary" id="createManualBtn">新增</button></div></div></div>
  <script>
  const $ = (id) => document.getElementById(id);

  const expenseCategories = ["餐飲", "交通", "購物", "生活", "娛樂", "學習", "固定支出", "醫療照護", "其他支出"];
  const incomeCategories = ["薪資", "接案收入", "獎金", "投資", "其他收入"];

  let transactions = [
    { id: createId(), type: "expense", date: getToday(), amount: 120, category: "餐飲", item: "午餐" },
    { id: createId(), type: "expense", date: getToday(), amount: 35, category: "交通", item: "捷運" },
    { id: createId(), type: "income", date: getToday(), amount: 8000, category: "接案收入", item: "設計案尾款" },
    { id: createId(), type: "expense", date: getToday(-1), amount: 160, category: "餐飲", item: "咖啡" },
    { id: createId(), type: "expense", date: getToday(), amount: 2000, category: "醫療照護", item: "看護費" },
    { id: createId(), type: "income", date: "2026-05-28", amount: 42000, category: "薪資", item: "薪水" },
    { id: createId(), type: "expense", date: "2026-05-30", amount: 890, category: "購物", item: "衣服" }
  ];

  let editingTarget = null;
  let filteredRows = [];

  function createId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
  }

  function getToday(offset = 0) {
    const date = new Date();
    date.setDate(date.getDate() + offset);
    return date.toISOString().slice(0, 10);
  }

  function getCurrentMonth() {
    return getToday().slice(0, 7);
  }

  function formatMoney(value) {
    return Number(value || 0).toLocaleString() + " 元";
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getCategoriesByType(type) {
    if (type === "income") {
      return [...new Set([...incomeCategories, ...transactions.filter(t => t.type === "income").map(t => t.category)])];
    }
    if (type === "expense") {
      return [...new Set([...expenseCategories, ...transactions.filter(t => t.type === "expense").map(t => t.category)])];
    }
    return [...new Set([...expenseCategories, ...incomeCategories, ...transactions.map(t => t.category)])];
  }

  function setSelectOptions(selectId, options, includeAll = false) {
    const select = $(selectId);
    const oldValue = select.value;
    select.innerHTML = "";

    if (includeAll) {
      const option = document.createElement("option");
      option.value = "all";
      option.textContent = "全部";
      select.appendChild(option);
    }

    options.forEach(value => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });

    if ([...select.options].some(option => option.value === oldValue)) {
      select.value = oldValue;
    }
  }

  function refreshCategorySelects() {
    setSelectOptions("manualCategory", getCategoriesByType($("manualType").value), false);
    setSelectOptions("statsCategory", getCategoriesByType($("statsType").value), true);
  }

  function summarize(rows) {
    const income = rows
      .filter(t => t.type === "income")
      .reduce((sum, t) => sum + Number(t.amount || 0), 0);

    const expense = rows
      .filter(t => t.type === "expense")
      .reduce((sum, t) => sum + Number(t.amount || 0), 0);

    return {
      income,
      expense,
      balance: income - expense,
      count: rows.length
    };
  }

  function renderTopSummary() {
    const summary = summarize(transactions.filter(t => t.date.startsWith(getCurrentMonth())));
    $("topMonthIncome").textContent = formatMoney(summary.income);
    $("topMonthExpense").textContent = formatMoney(summary.expense);
    $("topMonthBalance").textContent = formatMoney(summary.balance);
  }

  function getFilteredRows() {
    const month = $("statsMonth").value;
    const startDate = $("statsStartDate").value;
    const endDate = $("statsEndDate").value;
    const type = $("statsType").value;
    const category = $("statsCategory").value;

    return transactions.filter(t => {
      if (startDate || endDate) {
        if (startDate && t.date < startDate) return false;
        if (endDate && t.date > endDate) return false;
      } else if (month && !t.date.startsWith(month)) {
        return false;
      }

      if (type !== "all" && t.type !== type) return false;
      if (category !== "all" && t.category !== category) return false;

      return true;
    });
  }

  function getFilterSummaryText() {
    const startDate = $("statsStartDate").value;
    const endDate = $("statsEndDate").value;
    const month = $("statsMonth").value || getCurrentMonth();

    if (startDate || endDate) {
      return `日期：${startDate || "最早"} 至 ${endDate || "最新"}`;
    }

    return `月份：${month}`;
  }

  function applyStats() {
    filteredRows = getFilteredRows();

    renderTopSummary();
    renderFilteredSummary(filteredRows);
    renderCategoryBars(filteredRows);
    renderTodayList();
    renderDetailList(filteredRows);

    $("statsSummaryText").textContent = getFilterSummaryText();
  }

  function renderFilteredSummary(rows) {
    const summary = summarize(rows);
    $("filteredIncome").textContent = formatMoney(summary.income);
    $("filteredExpense").textContent = formatMoney(summary.expense);
    $("filteredBalance").textContent = formatMoney(summary.balance);
  }

  function renderCategoryBars(rows) {
    const totals = {};

    rows.forEach(t => {
      const key = `${t.type === "income" ? "收入" : "支出"}｜${t.category}`;
      totals[key] = (totals[key] || 0) + Number(t.amount || 0);
    });

    const container = $("categoryBars");
    container.innerHTML = "";

    const entries = Object.entries(totals);

    if (entries.length === 0) {
      container.innerHTML = '<div class="empty">目前篩選範圍沒有資料。</div>';
      return;
    }

    const max = Math.max(...entries.map(([, value]) => value), 1);

    entries
      .sort((a, b) => b[1] - a[1])
      .forEach(([key, value]) => {
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML = `
          <div>${escapeHtml(key)}</div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${Math.round(value / max * 100)}%"></div>
          </div>
          <div style="text-align:right">${formatMoney(value).replace(" 元", "")}</div>
        `;
        container.appendChild(row);
      });
  }

  function renderTodayList() {
    const rows = transactions.filter(t => t.date === getToday());
    renderEntryList($("todayList"), rows, "today");
  }

  function renderDetailList(rows) {
    const sorted = rows.slice().sort((a, b) => b.date.localeCompare(a.date));
    $("detailCountText").textContent = `目前顯示 ${sorted.length} 筆資料`;
    renderEntryList($("detailList"), sorted, "detail");
  }

  function renderEntryList(container, rows, scope) {
    container.innerHTML = "";

    if (rows.length === 0) {
      container.innerHTML = '<div class="empty">沒有資料。</div>';
      return;
    }

    rows.forEach(transaction => {
      container.appendChild(createEntryCard(transaction, scope));
    });
  }

  function createEntryCard(transaction, scope) {
    const card = document.createElement("div");
    card.className = "entry-card";

    const isEditing = editingTarget === `${scope}:${transaction.id}`;

    if (isEditing) {
      const categoryOptions = getCategoriesByType(transaction.type)
        .map(category => `
          <option value="${escapeHtml(category)}" ${category === transaction.category ? "selected" : ""}>
            ${escapeHtml(category)}
          </option>
        `)
        .join("");

      card.innerHTML = `
        <div class="edit-grid">
          <div class="field">
            <label>日期</label>
            <input id="${scope}-date-${transaction.id}" type="date" value="${transaction.date}">
          </div>

          <div class="filter-row">
            <div class="field">
              <label>類型</label>
              <select id="${scope}-type-${transaction.id}">
                <option value="expense" ${transaction.type === "expense" ? "selected" : ""}>支出</option>
                <option value="income" ${transaction.type === "income" ? "selected" : ""}>收入</option>
              </select>
            </div>

            <div class="field">
              <label>分類</label>
              <select id="${scope}-category-${transaction.id}">
                ${categoryOptions}
              </select>
            </div>
          </div>

          <div class="field">
            <label>項目</label>
            <input id="${scope}-item-${transaction.id}" value="${escapeHtml(transaction.item)}">
          </div>

          <div class="field">
            <label>金額</label>
            <input id="${scope}-amount-${transaction.id}" type="number" inputmode="numeric" value="${transaction.amount}">
          </div>

          <div class="edit-actions">
            <button class="button primary js-save" data-scope="${scope}" data-id="${transaction.id}">儲存</button>
            <button class="button secondary js-cancel">取消</button>
          </div>
        </div>
      `;

      return card;
    }

    const typeLabel = transaction.type === "income" ? "收入" : "支出";
    const amountClass = transaction.type === "income" ? "amount-income" : "amount-expense";
    const sign = transaction.type === "income" ? "+" : "-";

    card.innerHTML = `
      <div class="entry-top">
        <div style="min-width:0">
          <div class="entry-title">
            <span class="tag ${transaction.type}">${typeLabel}</span>
            <span class="entry-title-text">${escapeHtml(transaction.item)}</span>
          </div>
          <div class="entry-date">${escapeHtml(transaction.date)}｜${escapeHtml(transaction.category)}</div>
        </div>
        <div class="entry-amount ${amountClass}">${sign}${formatMoney(transaction.amount)}</div>
      </div>

      <div class="entry-actions">
        <button class="button secondary small js-edit" data-scope="${scope}" data-id="${transaction.id}">修改</button>
        <button class="button danger small js-delete" data-id="${transaction.id}">刪除</button>
      </div>
    `;

    return card;
  }

  function openManualModal() {
    $("manualModal").classList.add("open");
    if (!$("manualDate").value) $("manualDate").value = getToday();
  }

  function closeManualModal() {
    $("manualModal").classList.remove("open");
  }

  function createManualTransaction() {
    const item = $("manualItem").value.trim();
    const amount = Number($("manualAmount").value);

    if (!item) {
      alert("請輸入項目。");
      return;
    }

    if (!amount || amount <= 0) {
      alert("請輸入金額。");
      return;
    }

    transactions.unshift({
      id: createId(),
      date: $("manualDate").value || getToday(),
      type: $("manualType").value,
      category: $("manualCategory").value,
      item,
      amount
    });

    $("manualItem").value = "";
    $("manualAmount").value = "";

    closeManualModal();
    refreshCategorySelects();
    applyStats();
  }

  function clearManualForm() {
    $("manualDate").value = getToday();
    $("manualType").value = "expense";
    refreshCategorySelects();
    $("manualCategory").value = "餐飲";
    $("manualItem").value = "";
    $("manualAmount").value = "";
  }

  function resetStats() {
    $("statsMonth").value = getCurrentMonth();
    $("statsStartDate").value = "";
    $("statsEndDate").value = "";
    $("statsType").value = "all";
    refreshCategorySelects();
    $("statsCategory").value = "all";
    applyStats();
  }

  function startEdit(scope, id) {
    editingTarget = `${scope}:${id}`;
    applyStats();
  }

  function cancelEdit() {
    editingTarget = null;
    applyStats();
  }

  function saveEdit(scope, id) {
    const date = $(`${scope}-date-${id}`).value;
    const type = $(`${scope}-type-${id}`).value;
    const category = $(`${scope}-category-${id}`).value;
    const item = $(`${scope}-item-${id}`).value.trim();
    const amount = Number($(`${scope}-amount-${id}`).value);

    if (!item) {
      alert("項目不可空白。");
      return;
    }

    if (!amount || amount <= 0) {
      alert("金額需大於 0。");
      return;
    }

    transactions = transactions.map(t => {
      if (t.id !== id) return t;
      return { ...t, date, type, category, item, amount };
    });

    editingTarget = null;
    refreshCategorySelects();
    applyStats();
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    if (editingTarget && editingTarget.endsWith(`:${id}`)) editingTarget = null;
    refreshCategorySelects();
    applyStats();
  }

  function bindEvents() {
    $("openManualModalBtn").addEventListener("click", openManualModal);
    $("openManualModalBtn2").addEventListener("click", openManualModal);
    $("bottomAddBtn").addEventListener("click", openManualModal);
    $("closeManualModalBtn").addEventListener("click", closeManualModal);

    $("manualModal").addEventListener("click", event => {
      if (event.target.id === "manualModal") closeManualModal();
    });

    $("createManualBtn").addEventListener("click", createManualTransaction);
    $("clearManualBtn").addEventListener("click", clearManualForm);

    $("resetStatsBtn").addEventListener("click", resetStats);
    $("applyStatsBtn").addEventListener("click", applyStats);

    $("manualType").addEventListener("change", () => {
      setSelectOptions("manualCategory", getCategoriesByType($("manualType").value), false);
    });

    $("statsType").addEventListener("change", () => {
      setSelectOptions("statsCategory", getCategoriesByType($("statsType").value), true);
      applyStats();
    });

    ["statsMonth", "statsStartDate", "statsEndDate", "statsCategory"].forEach(id => {
      $(id).addEventListener("change", applyStats);
    });

    $("jumpTodayBtn").addEventListener("click", () => {
      $("todaySection").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    $("jumpStatsBtn").addEventListener("click", () => {
      $("queryDetails").open = true;
      $("queryDetails").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.body.addEventListener("click", event => {
      const editButton = event.target.closest(".js-edit");
      const deleteButton = event.target.closest(".js-delete");
      const saveButton = event.target.closest(".js-save");
      const cancelButton = event.target.closest(".js-cancel");

      if (editButton) {
        startEdit(editButton.dataset.scope, editButton.dataset.id);
      }

      if (deleteButton) {
        deleteTransaction(deleteButton.dataset.id);
      }

      if (saveButton) {
        saveEdit(saveButton.dataset.scope, saveButton.dataset.id);
      }

      if (cancelButton) {
        cancelEdit();
      }
    });
  }

  function init() {
    $("manualDate").value = getToday();
    $("statsMonth").value = getCurrentMonth();

    refreshCategorySelects();

    $("manualCategory").value = "餐飲";
    $("statsCategory").value = "all";

    bindEvents();
    applyStats();
  }

  init();
</script>
</body>
</html>
